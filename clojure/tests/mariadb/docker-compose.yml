services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pgloader
      POSTGRES_PASSWORD: pgloader
      POSTGRES_DB: target
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgloader -d target"]
      interval: 5s
      timeout: 5s
      retries: 10

  mariadb:
    build:
      context: ../../..
      dockerfile: clojure/tests/mariadb/Dockerfile
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
      MARIADB_USER: pgloader
      MARIADB_PASSWORD: pgloader
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root -prootpassword -e 'USE source; SELECT COUNT(*) FROM users' 2>/dev/null && mariadb -u root -prootpassword -e 'USE sakila; SELECT COUNT(*) FROM actor' 2>/dev/null && mariadb -u root -prootpassword -e 'USE f1db; SELECT COUNT(*) FROM circuits' 2>/dev/null && mariadb -u root -prootpassword -e 'USE pgloader_mysql_unit_full; SELECT COUNT(*) FROM salary_check' 2>/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 30

  test-runner:
    image: pgloader-test-runner:latest
    build:
      context: ../../..
      dockerfile: clojure/tests/Dockerfile
    volumes:
      - .:/suite
      - ../mysql-unit-full:/suite/mysql-unit-full
      - ../../target/pgloader.jar:/pgloader.jar:ro
    environment:
      JAR: /pgloader.jar
      MYSQL_HOST: mariadb
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: target
      PGUSER: pgloader
      PGPASSWORD: pgloader
    depends_on:
      postgres: {condition: service_healthy}
      mariadb:  {condition: service_healthy}
    profiles: [test]
    command: make -C /suite
