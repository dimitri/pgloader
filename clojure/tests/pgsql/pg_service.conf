# PostgreSQL service file for pgloader integration tests.
# Used by pgsql_pg_test.clj via PGSERVICEFILE env var.
# Inside Docker Compose: services resolve to the container hostnames below.
# For local runs: set PGSERVICEFILE and adjust host/port to match your setup.

[source]
host=source
port=5432
dbname=source
user=pgloader
password=pgloader

[target]
host=target
port=5432
dbname=target
user=pgloader
password=pgloader
